services:
  onlyoffice:
    image: onlyoffice/documentserver:latest
    ports:
      - "27670:80"
    volumes:
      - ./server/onlyoffice-bootstrap.sh:/app/onlyoffice-bootstrap.sh:ro
    entrypoint:
      - /bin/bash
      - /app/onlyoffice-bootstrap.sh
    environment:
      # For quick setup. For production, enable JWT and configure secrets.
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
      - MAX_DOWNLOAD_BYTES=536870912
    restart: unless-stopped

  bridge:
    build: ./server
    ports:
      - "27689:27689"
    volumes:
      - ./server/cache:/app/cache
    environment:
      - BRIDGE_PORT=27689
      # Bridge -> ONLYOFFICE connectivity (inside Docker network)
      - ONLYOFFICE_INTERNAL_URL=http://onlyoffice:80
      # Browser -> ONLYOFFICE (used by editor page to load api.js)
      - ONLYOFFICE_PUBLIC_URL=http://127.0.0.1:27670
      # Public URL used for callback/proxy links generated by bridge
      - BRIDGE_URL=http://bridge:27689
      # Optional if you expose bridge under a sub-path via reverse proxy
      # - BRIDGE_BASE_PATH=/bridge
      # Optional shared secret (must match plugin setting)
      - BRIDGE_SECRET=
      # File cache TTL in hours (default 24h)
      - CACHE_TTL_HOURS=24
      # Multi-tenant isolation controls
      # - BRIDGE_DEFAULT_TENANT=default
      # - BRIDGE_REQUIRE_TENANT=false
      # Optional only when bridge can directly access SiYuan
      # - SIYUAN_URL=
      # - SIYUAN_TOKEN=
    depends_on:
      - onlyoffice
    restart: unless-stopped
